name: ASan

on:
  push:
    branches: [ master ]
    paths-ignore: [ '**.md' ]
  pull_request:
    branches: [ master ]
    paths-ignore: [ '**.md' ]

jobs:
  asan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build libncurses-dev

    - name: Meson setup (ASan + UBSan)
      run: meson setup build-asan -Db_sanitize=address,undefined -Db_lundef=false

    - name: Build
      run: meson compile -C build-asan

    - name: Test
      run: meson test -C build-asan
      env:
        ASAN_OPTIONS: abort_on_error=1
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
