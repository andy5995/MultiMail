name: Linux

on:
  push:
    branches: [ master ]
    paths-ignore: [ '**.md' ]
  pull_request:
    branches: [ master ]
    paths-ignore: [ '**.md' ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CXXFLAGS: -Werror
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build libncurses-dev

    - name: Meson setup
      run: meson setup builddir

    - name: Build
      run: meson compile -C builddir
