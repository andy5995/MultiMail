name: macOS

on:
  push:
    branches: [ master ]
    paths: &shared_paths
      - '**'
      - '!**.yml'
      - '!**.md'
      - '**/macos.yml'

  pull_request:
    branches: [ master ]
    paths: *shared_paths

jobs:
  build:
    runs-on: macos-latest
    env:
      CXXFLAGS: -Werror
    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: brew install meson ninja

    - name: Meson setup
      run: meson setup builddir

    - name: Build
      run: meson compile -C builddir

    - name: Test
      run: meson test -C builddir
